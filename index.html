<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phillips Strategy</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0d1520;
    color: #f0ebe1;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .logo-wrap {
    margin-bottom: 3rem;
    opacity: 0;
    animation: up 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f0ebe1;
    cursor: default;
    transition: color 0.2s;
  }
  .logo:hover {
    color: #a8d8ff;
    animation: surge-blue 0.15s infinite;
  }
  @keyframes surge-blue {
    0%   { text-shadow: 0 0 4px #4fc3f7, 0 0 12px #0288d1, 0 0 24px #01579b; }
    25%  { text-shadow: 0 0 8px #81d4fa, 0 0 20px #4fc3f7, 0 0 40px #0288d1; }
    50%  { text-shadow: 0 0 2px #b3e5fc, 0 0 8px #4fc3f7, 0 0 16px #0288d1; }
    75%  { text-shadow: 0 0 10px #4fc3f7, 0 0 30px #0288d1, 0 0 50px #01579b; }
    100% { text-shadow: 0 0 4px #4fc3f7, 0 0 12px #0288d1, 0 0 24px #01579b; }
  }
  .tagline-wrap {
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: up 0.9s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(3rem, 7.5vw, 5.5rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
    color: #f0ebe1;
    cursor: default;
    transition: color 0.2s;
  }
  .tagline span { color: rgba(240,235,225,0.28); font-style: italic; }
  .tagline:hover {
    color: #ffaaaa;
    animation: surge-red 0.12s infinite;
  }
  .tagline:hover span { color: rgba(255,100,100,0.4); }
  @keyframes surge-red {
    0%   { text-shadow: 0 0 6px #ff4444, 0 0 20px #cc0000, 0 0 40px #800000, 0 0 80px #400000; }
    20%  { text-shadow: 0 0 2px #ff8888, 0 0 30px #ff2222, 0 0 60px #cc0000, 0 0 100px #800000; }
    40%  { text-shadow: 0 0 10px #ff0000, 0 0 40px #cc0000, 0 0 80px #800000, 0 0 120px #400000; }
    60%  { text-shadow: 0 0 4px #ff6666, 0 0 15px #ff0000, 0 0 35px #cc0000, 0 0 70px #800000; }
    80%  { text-shadow: 0 0 8px #ff3333, 0 0 25px #dd0000, 0 0 55px #aa0000, 0 0 90px #600000; }
    100% { text-shadow: 0 0 6px #ff4444, 0 0 20px #cc0000, 0 0 40px #800000, 0 0 80px #400000; }
  }
  .cta-wrap {
    opacity: 0;
    animation: up 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .cta {
    display: inline-block;
    padding: 0.85rem 2.25rem;
    border: 1px solid rgba(240,235,225,0.3);
    color: rgba(240,235,225,0.65);
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
  }
  .cta:hover { border-color: #f0ebe1; color: #0d1520; background: #f0ebe1; }
  @keyframes up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="logo-wrap"><div class="logo">Phillips Strategy</div></div>
  <div class="tagline-wrap"><h1 class="tagline">People<span>,</span> power<span>,</span> change<span>.</span></h1></div>
  <div class="cta-wrap"><a class="cta" href="mailto:hello@phillipsstrategy.co.uk">Contact us</a></div>
</body>
</html>
